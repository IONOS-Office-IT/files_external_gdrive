services:
  nextcloud:
    image: nextcloud:33-apache
    container_name: nc-gdrive-dev
    ports:
      - "8080:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost"
    volumes:
      - nc_data:/var/www/html
      # Mount the app source into Nextcloud's custom_apps directory
      - ./:/var/www/html/custom_apps/files_external_gdrive
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Install composer dependencies if vendor/ is missing
        if [ ! -d /var/www/html/custom_apps/files_external_gdrive/vendor ]; then
          echo "Installing composer dependencies..."
          apt-get update -qq && apt-get install -y -qq unzip > /dev/null 2>&1
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          cd /var/www/html/custom_apps/files_external_gdrive
          composer install --no-dev --prefer-dist --no-interaction
          chown -R www-data:www-data vendor/
        fi
        # Start Apache (default Nextcloud entrypoint)
        exec /entrypoint.sh apache2-foreground

  db:
    image: postgres:16-alpine
    container_name: nc-gdrive-db
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nc_data:
  db_data:
